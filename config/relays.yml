# Bootstrap (seed) relays for the server-side NostrClient: the set it connects to
# at startup, per environment. A signed-in user's own relays (NIP-65) are added
# on top of these at runtime, so this is only the seed, not the full relay list.
default: &default
  urls:
    - wss://relay.damus.io
    - wss://relay.nostr.band
    - wss://nos.lol
  # R_op's NIP-17/59 DM-inbox relays, distinct from the catalog ingest `urls` above. Must
  # AUTH-gate kind-1059 serving (empirically vetted, see the nip17-relays memory):
  # auth.nostr1.com is the free recipient-restricted inbox; the self-hosted relay_rb inbox is
  # added here once it is fortified (deferred until after v1).
  dm_relays:
    - wss://auth.nostr1.com

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
