# PostgreSQL. Versions 9.5 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/opt/homebrew/bin/pg_config
#
# Configure Using Gemfile
# gem "pg"
#
# Solid Cache, Solid Queue and Solid Cable each run in their OWN database on the
# SAME host: they share the connection settings from the `default` anchor and
# differ only by database name. Each keeps its own schema file
# (db/{cache,queue,cable}_schema.rb), separate from the app's db/schema.rb.
default: &default
  adapter: postgresql
  encoding: unicode
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "") %>
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary: &development_primary
    <<: *default
    database: switchboard_development
    username: <%= ENV.fetch("DATABASE_USERNAME", "switchboard") %>
  cache:
    <<: *development_primary
    database: switchboard_development_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *development_primary
    database: switchboard_development_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *development_primary
    database: switchboard_development_cable
    migrations_paths: db/cable_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: switchboard_test

# Provide the password or a full connection URL as an environment variable when
# you boot the app. Non-primary connections can use {NAME}_DATABASE_URL, e.g.
# CACHE_DATABASE_URL. See https://guides.rubyonrails.org/configuring.html#configuring-a-database
production:
  primary: &production_primary
    <<: *default
    database: switchboard_production
  cache:
    <<: *production_primary
    database: switchboard_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *production_primary
    database: switchboard_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *production_primary
    database: switchboard_production_cable
    migrations_paths: db/cable_migrate
