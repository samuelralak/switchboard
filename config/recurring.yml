production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  reap_expired_login_challenges:
    command: "LoginChallenge.where(expires_at: ..Time.current).delete_all"
    schedule: every hour at minute 27
  reap_expired_sessions:
    command: "Session.where(created_at: ..Session::MAX_AGE.ago).delete_all"
    schedule: at 4am every day
  reap_expired_inbox_wraps:
    command: "InboxWrap.prune_expired"
    schedule: at 3am every day
